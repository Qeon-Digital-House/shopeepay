name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: PHPUnit (PHP ${{ matrix.php }}, deps ${{ matrix.deps }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        deps: [lowest, highest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl, json, hash, mbstring
          coverage: none
          ini-values: error_reporting=-1, memory_limit=512M

      - name: Resolve composer flags
        id: flags
        run: |
          if [ "${{ matrix.deps }}" = "lowest" ]; then
            echo "flags=--prefer-lowest --prefer-stable" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: ${{ matrix.deps }}

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite Unit

  phpstan:
    name: PHPStan (level 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: openssl, json, hash, mbstring
          coverage: none

      - uses: ramsey/composer-install@v3

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  integration:
    name: E2E Sandbox (gated on secrets)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: openssl, json, hash, mbstring
          coverage: none

      - uses: ramsey/composer-install@v3

      - name: Check secrets
        id: have_secrets
        env:
          CLIENT_ID: ${{ secrets.SHOPEEPAY_CLIENT_ID }}
        run: |
          if [ -z "$CLIENT_ID" ]; then
            echo "::warning::SHOPEEPAY_* secrets not set — skipping integration tests."
            echo "have=false" >> "$GITHUB_OUTPUT"
          else
            echo "have=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests
        if: steps.have_secrets.outputs.have == 'true'
        env:
          SHOPEEPAY_CLIENT_ID:      ${{ secrets.SHOPEEPAY_CLIENT_ID }}
          SHOPEEPAY_CLIENT_SECRET:  ${{ secrets.SHOPEEPAY_CLIENT_SECRET }}
          SHOPEEPAY_PRIVATE_KEY:    ${{ secrets.SHOPEEPAY_PRIVATE_KEY }}
          SHOPEEPAY_PUBLIC_KEY:     ${{ secrets.SHOPEEPAY_PUBLIC_KEY }}
          SHOPEEPAY_MERCHANT_ID:    ${{ secrets.SHOPEEPAY_MERCHANT_ID }}
          SHOPEEPAY_ENVIRONMENT:    sandbox
        run: vendor/bin/phpunit --testsuite Integration
